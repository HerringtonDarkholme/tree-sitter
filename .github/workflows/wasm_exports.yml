name: Check Wasm Exports

on:
  pull_request:
    paths:
      - lib/include/tree_sitter/api.h
      - lib/binding_web/**
      - xtask/src/**
  push:
    branches: [master]
    paths:
      - lib/include/tree_sitter/api.h
      - lib/binding_rust/bindings.rs

jobs:
  check-wasm-exports:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up stable Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          # The web bindings build the Rust core as a wasm32-unknown-emscripten
          # staticlib; llvm-tools provides rust-objcopy to strip its debug info.
          target: wasm32-unknown-emscripten
          components: llvm-tools

      - name: Install wasm-objdump
        run: sudo apt-get update -y && sudo apt-get install -y wabt

      - name: Build Wasm Library
        working-directory: lib/binding_web
        run: npm ci && npm run build:debug

      - name: Check Wasm exports
        run: cargo xtask check-wasm-exports
